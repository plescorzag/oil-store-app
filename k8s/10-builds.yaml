apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: oil-essence-web
  namespace: oil-demo
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: oil-demo-service
  namespace: oil-demo
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
