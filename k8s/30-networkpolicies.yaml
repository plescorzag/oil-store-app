apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress-except-trusted
  namespace: oil-blocked
spec:
  podSelector:
    matchLabels:
      app: oil-blocked
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: oil-blocked
      podSelector:
        matchLabels:
          role: trusted
